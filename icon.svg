<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background -->
  <rect width="512" height="512" rx="112" fill="#0a0808"/>
  <!-- film perforations left -->
  <rect x="28" y="100" width="36" height="52" rx="8" fill="#2a2020"/>
  <rect x="28" y="180" width="36" height="52" rx="8" fill="#2a2020"/>
  <rect x="28" y="260" width="36" height="52" rx="8" fill="#2a2020"/>
  <rect x="28" y="340" width="36" height="52" rx="8" fill="#2a2020"/>
  <!-- film perforations right -->
  <rect x="448" y="100" width="36" height="52" rx="8" fill="#2a2020"/>
  <rect x="448" y="180" width="36" height="52" rx="8" fill="#2a2020"/>
  <rect x="448" y="260" width="36" height="52" rx="8" fill="#2a2020"/>
  <rect x="448" y="340" width="36" height="52" rx="8" fill="#2a2020"/>
  <!-- lens outer ring -->
  <circle cx="256" cy="256" r="152" fill="none" stroke="#3a2c1e" stroke-width="12"/>
  <!-- lens body -->
  <circle cx="256" cy="256" r="134" fill="#1a1212"/>
  <!-- lens highlight ring -->
  <circle cx="256" cy="256" r="112" fill="none" stroke="#d4a054" stroke-width="3" opacity="0.7"/>
  <!-- lens glass -->
  <circle cx="256" cy="256" r="96" fill="#0d1018"/>
  <!-- lens bokeh glint -->
  <circle cx="218" cy="218" r="26" fill="white" opacity="0.06"/>
  <circle cx="222" cy="222" r="10" fill="white" opacity="0.12"/>
  <!-- film stock label -->
  <text x="256" y="428" font-family="Helvetica Neue,sans-serif" font-size="28" font-weight="700"
        fill="#d4a054" text-anchor="middle" letter-spacing="6">KODAK</text>
</svg>
