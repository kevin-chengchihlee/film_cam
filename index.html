<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0808">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FilmCam">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>FilmCam</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Camera Screen ────────────────────────── -->
  <div id="camera-screen">

    <div id="viewfinder-wrap">
      <video id="viewfinder" autoplay playsinline muted></video>
      <!-- live grain overlay -->
      <canvas id="grain-canvas"></canvas>
      <!-- CSS vignette -->
      <div id="vignette"></div>
    </div>

    <!-- Top HUD -->
    <div id="top-bar">
      <div id="film-badge">KODAK&nbsp;400</div>
      <div id="frame-counter">&#9726; <span id="counter-num">00</span></div>
      <button id="flip-btn" aria-label="Flip camera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 7H4M4 7l4-4M4 7l4 4M4 17h16M16 13l4 4-4 4"/>
        </svg>
      </button>
    </div>

    <!-- Bottom Controls -->
    <div id="controls">
      <button id="gallery-btn" aria-label="Open gallery">
        <div id="gallery-thumb-wrap">
          <img id="gallery-thumb" src="" alt="" draggable="false">
          <div id="gallery-thumb-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <path d="M21 15l-5-5L5 21"/>
            </svg>
          </div>
        </div>
      </button>

      <button id="shutter-btn" aria-label="Take photo">
        <div id="shutter-ring">
          <div id="shutter-inner"></div>
        </div>
      </button>

      <div id="controls-spacer"></div>
    </div>

    <!-- Flash overlay -->
    <div id="flash"></div>
  </div>

  <!-- ── Gallery Screen ───────────────────────── -->
  <div id="gallery-screen" class="hidden">
    <div id="gallery-header">
      <button id="close-gallery-btn" aria-label="Close gallery">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
        </svg>
      </button>
      <span>Roll</span>
      <div id="photo-count-label"></div>
    </div>
    <div id="gallery-grid"></div>
    <div id="gallery-empty">
      <div id="gallery-empty-icon">&#9432;</div>
      <p>No shots yet.<br>Press the shutter.</p>
    </div>
  </div>

  <!-- ── Photo Viewer ──────────────────────────── -->
  <div id="viewer-screen" class="hidden">
    <button id="close-viewer-btn" aria-label="Close viewer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    <div id="viewer-img-wrap">
      <img id="viewer-img" src="" alt="" draggable="false">
    </div>
    <div id="viewer-actions">
      <button id="download-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Save
      </button>
      <button id="delete-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
        </svg>
        Delete
      </button>
    </div>
  </div>

  <!-- Hidden canvas for capture processing -->
  <canvas id="capture-canvas" style="display:none"></canvas>

  <script src="app.js"></script>
</body>
</html>
